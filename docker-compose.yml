version: "3.9"

services:
  tests:
    build: .
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./report:/app/report
      - ./src:/app/src
      - ./tests:/app/tests
    command: pytest tests/ -v --tb=short --cov=src --cov-report=term-missing

  notebook:
    build: .
    ports:
      - "8888:8888"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./notebooks:/app/notebooks
      - ./report:/app/report
      - ./src:/app/src
    command: >
      jupyter notebook
      --ip=0.0.0.0
      --port=8888
      --no-browser
      --allow-root
      --ServerApp.token=''
      --ServerApp.password=''
      --notebook-dir=/app/notebooks
    environment:
      - PYTHONPATH=/app